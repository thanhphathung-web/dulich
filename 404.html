<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Không tìm thấy trang — Baggio Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#faf8f3;--ink:#1a1712;--red:#c5372b;--muted:#8a8578;--border:#e8e3d8;--card:#fffdf9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.code{font-family:'Playfair Display',serif;font-size:clamp(5rem,20vw,10rem);font-weight:900;line-height:1;color:var(--ink)}
.code em{color:var(--red);font-style:normal}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:1rem}
h1{font-family:'Playfair Display',serif;font-size:1.5rem;margin:.75rem 0 .5rem}
p{color:var(--muted);font-size:.9rem;max-width:420px;line-height:1.7}
.btns{display:flex;gap:.75rem;margin-top:2rem;flex-wrap:wrap;justify-content:center}
.btn-red{background:var(--red);color:#fff;padding:.85rem 1.75rem;text-decoration:none;font-weight:700;font-size:.85rem}
.btn-red:hover{background:#a82d22}
.btn-outline{border:1px solid var(--border);background:var(--card);color:var(--ink);padding:.85rem 1.75rem;text-decoration:none;font-weight:500;font-size:.85rem}
.btn-outline:hover{border-color:var(--ink)}
.brand{position:fixed;top:1.25rem;left:1.5rem;font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:var(--ink);text-decoration:none}
.brand span{color:var(--red)}
</style>
</head>
<body>
<a class="brand" href="/">Baggio<span>.</span>Travel</a>
<div class="eyebrow">— Lạc đường rồi</div>
<div class="code">4<em>0</em>4</div>
<h1>Trang này không tồn tại</h1>
<p>Có thể tour đã ngừng bán hoặc đường dẫn bị gõ sai. Đừng lo — còn nhiều hành trình khác đang chờ bạn.</p>
<div class="btns">
  <a class="btn-red" href="/">Về trang chủ</a>
  <a class="btn-outline" href="/booking">Đặt tour</a>
  <a class="btn-outline" href="https://zalo.me/0906306286" target="_blank" rel="noopener">Chat Zalo</a>
</div>
</body>
</html>
