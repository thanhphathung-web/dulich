<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#1c2230;--s3:#21283a;
  --border:#253047;--border2:#2d3a55;
  --text:#e6edf3;--text2:#8b949e;--text3:#3d4f6e;
  --green:#3fb950;--gdim:rgba(63,185,80,.12);--gbrd:rgba(63,185,80,.3);
  --blue:#58a6ff;--bdim:rgba(88,166,255,.1);--bbrd:rgba(88,166,255,.25);
  --amber:#d29922;--adim:rgba(210,153,34,.1);--abrd:rgba(210,153,34,.25);
  --red:#f85149;--rdim:rgba(248,81,73,.1);--rbrd:rgba(248,81,73,.25);
  --purple:#bc8cff;--pdim:rgba(188,140,255,.1);--pbrd:rgba(188,140,255,.3);
  --teal:#39d353;
  --font:'Be Vietnam Pro',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:grid;grid-template-columns:300px 1fr;grid-template-rows:52px 1fr}

.topbar{grid-column:1/-1;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1rem}
.tb-logo{font-family:var(--mono);font-size:.88rem;font-weight:700;color:var(--text)}
.tb-logo span{color:var(--green)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.tb-clock{font-family:var(--mono);font-size:.68rem;color:var(--text3)}

/* LEFT PANEL — BOOKING LIST */
.left-panel{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lp-header{padding:.85rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.lp-title{font-weight:600;font-size:.82rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between}
.lp-search{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.78rem;padding:.45rem .75rem;border-radius:5px;outline:none;width:100%;transition:border-color .2s}
.lp-search:focus{border-color:var(--blue)}
.lp-search::placeholder{color:var(--text3)}
.lp-filter-row{display:flex;gap:.4rem;margin-top:.5rem}
.lp-filter{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.6rem;padding:.3rem .45rem;border-radius:4px;outline:none;cursor:pointer;flex:1}
.lp-filter option{background:var(--s2)}
.booking-list{flex:1;overflow-y:auto}
.booking-item{padding:.85rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;position:relative}
.booking-item:hover{background:rgba(255,255,255,.03)}
.booking-item.active{background:var(--bdim);border-left:2px solid var(--blue)}
.bi-ref{font-family:var(--mono);font-size:.62rem;color:var(--blue);margin-bottom:.2rem;display:flex;align-items:center;justify-content:space-between}
.bi-name{font-weight:600;font-size:.85rem;color:var(--text);margin-bottom:.15rem}
.bi-tour{font-size:.72rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.bi-meta{display:flex;align-items:center;gap:.5rem}
.bi-badge{font-family:var(--mono);font-size:.52rem;padding:.15rem .35rem;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.bi-badge.pending{background:var(--adim);border:1px solid var(--abrd);color:var(--amber)}
.bi-badge.confirmed{background:var(--bdim);border:1px solid var(--bbrd);color:var(--blue)}
.bi-badge.completed{background:var(--gdim);border:1px solid var(--gbrd);color:var(--green)}
.bi-badge.cancelled{background:var(--rdim);border:1px solid var(--rbrd);color:var(--red)}
.bi-unread{position:absolute;top:.85rem;right:1rem;width:8px;height:8px;border-radius:50%;background:var(--red)}
.bi-last-contact{font-size:.65rem;color:var(--text3);font-family:var(--mono)}

/* RIGHT PANEL — CONVERSATION */
.right-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.rp-header{background:var(--s1);border-bottom:1px solid var(--border);padding:.85rem 1.25rem;flex-shrink:0}
.rp-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.rp-name{font-weight:700;font-size:.95rem;color:var(--text)}
.rp-tour{font-size:.75rem;color:var(--text2)}
.rp-actions{display:flex;gap:.5rem}
.rp-meta{display:flex;gap:1.25rem;flex-wrap:wrap}
.rp-meta-item{font-size:.72rem;color:var(--text2);display:flex;align-items:center;gap:.3rem}
.rp-meta-item strong{color:var(--text);font-weight:500}

/* CONVERSATION */
.conv-wrap{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.85rem}
.msg-group{display:flex;flex-direction:column;gap:.4rem}
.msg-date-sep{text-align:center;margin:.5rem 0}
.msg-date-sep span{font-family:var(--mono);font-size:.58rem;color:var(--text3);background:var(--s2);padding:.25rem .75rem;border-radius:20px;border:1px solid var(--border)}
.msg-row{display:flex;gap:.6rem;align-items:flex-end}
.msg-row.out{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.62rem;font-weight:700;flex-shrink:0}
.msg-avatar.staff{background:var(--bdim);border-color:var(--bbrd);color:var(--blue)}
.msg-avatar.guest{background:var(--gdim);border-color:var(--gbrd);color:var(--green)}
.msg-bubble{max-width:72%;padding:.65rem .9rem;border-radius:8px;font-size:.83rem;line-height:1.6;position:relative}
.msg-bubble.in{background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:3px;color:var(--text)}
.msg-bubble.out{background:var(--bdim);border:1px solid var(--bbrd);border-bottom-right-radius:3px;color:var(--text)}
.msg-bubble.note{background:var(--adim);border:1px solid var(--abrd);border-radius:6px;font-style:italic;color:var(--amber)}
.msg-channel{font-family:var(--mono);font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.2rem;opacity:.6}
.msg-time{font-family:var(--mono);font-size:.58rem;color:var(--text3);margin-top:.25rem}
.msg-row.out .msg-time{text-align:right}
.msg-type-badge{font-family:var(--mono);font-size:.52rem;padding:.12rem .35rem;border-radius:3px;margin-bottom:.2rem;display:inline-block}
.mt-call{background:var(--gdim);border:1px solid var(--gbrd);color:var(--green)}
.mt-zalo{background:var(--bdim);border:1px solid var(--bbrd);color:var(--blue)}
.mt-email{background:var(--pdim);border:1px solid var(--pbrd);color:var(--purple)}
.mt-sms{background:var(--adim);border:1px solid var(--abrd);color:var(--amber)}
.mt-note{background:var(--adim);border:1px solid var(--abrd);color:var(--amber)}
.mt-meeting{background:var(--rdim);border:1px solid var(--rbrd);color:var(--red)}

/* INPUT */
.input-area{background:var(--s1);border-top:1px solid var(--border);padding:.85rem 1.25rem;flex-shrink:0}
.input-top{display:flex;gap:.5rem;margin-bottom:.6rem;align-items:center}
.channel-select{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.65rem;padding:.35rem .55rem;border-radius:4px;outline:none;cursor:pointer}
.channel-select option{background:var(--s2)}
.dir-select{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.65rem;padding:.35rem .55rem;border-radius:4px;outline:none;cursor:pointer}
.remind-check{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text2);margin-left:auto;cursor:pointer}
.remind-check input{accent-color:var(--blue)}
.input-row{display:flex;gap:.65rem;align-items:flex-end}
.msg-input{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.85rem;padding:.65rem .9rem;border-radius:6px;outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color .2s;line-height:1.5}
.msg-input:focus{border-color:var(--blue)}
.msg-input::placeholder{color:var(--text3)}
.send-btn{background:var(--blue);border:none;color:#0d1117;font-family:var(--mono);font-size:.68rem;padding:.65rem 1.1rem;border-radius:6px;cursor:pointer;font-weight:700;transition:all .2s;white-space:nowrap}
.send-btn:hover{background:#79b8ff}

/* TEMPLATES */
.templates-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.tmpl-btn{background:var(--s3);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:.72rem;padding:.3rem .65rem;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tmpl-btn:hover{border-color:var(--border2);color:var(--text)}

/* EMPTY */
.empty-conv{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:.5rem}
.empty-conv-icon{font-size:2.5rem;opacity:.3}

/* MODAL REMINDER */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:440px}
.modal-header{background:var(--s3);border-bottom:1px solid var(--border);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:600;font-size:.88rem}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer}
.modal-body{padding:1.25rem;display:flex;flex-direction:column;gap:.75rem}
.modal-footer{padding:.85rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.form-input,.form-select,.form-textarea{background:var(--s1);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.83rem;padding:.55rem .8rem;border-radius:5px;outline:none;transition:border-color .2s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue)}
.form-select option{background:var(--s2)}
.form-textarea{resize:vertical;min-height:72px}

/* BTN */
.btn{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.38rem .85rem;border-radius:5px;cursor:pointer;transition:all .15s;border:1px solid}
.btn-default{background:none;border-color:var(--border);color:var(--text2)}
.btn-default:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#0d1117}
.btn-primary:hover{background:#79b8ff}
.btn-green{background:var(--green);border-color:var(--green);color:#0d1117}
.btn-amber{background:var(--amber);border-color:var(--amber);color:#0d1117}

/* STAT ROW TOP */
.stat-strip{background:var(--s1);border-bottom:1px solid var(--border);padding:.5rem 1.25rem;display:flex;gap:1.5rem;flex-shrink:0}
.ss-item{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--text2)}
.ss-val{font-family:var(--mono);font-weight:700;color:var(--text)}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.65rem 1rem;font-size:.8rem;border-radius:6px;animation:toastIn .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:.5rem;min-width:220px}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:900px){body{grid-template-columns:1fr}.left-panel{display:none}}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<!-- MODAL NHẮC NHỞ -->
<div class="modal-bg" id="reminderModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🔔 Tạo nhắc nhở liên hệ</div>
      <button class="modal-close" onclick="closeReminder()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nhắc vào ngày</label><input class="form-input" id="rm_date" type="date"></div>
      <div class="form-group"><label class="form-label">Kênh liên hệ</label>
        <select class="form-select" id="rm_channel">
          <option value="zalo">💬 Zalo</option>
          <option value="call">📞 Điện thoại</option>
          <option value="email">📧 Email</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Nội dung nhắc</label><textarea class="form-textarea" id="rm_note" placeholder="VD: Gọi xác nhận thanh toán còn lại trước tour 7 ngày..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveReminder()">💾 Lưu nhắc nhở</button>
      <button class="btn btn-default" onclick="closeReminder()">Hủy</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="tb-logo">Baggio<span>.</span>CRM</div>
  <div style="font-size:.75rem;color:var(--text3)">/ Nhật ký liên lạc khách hàng</div>
  <div class="tb-right">
    <a href="baggio-admin.html" class="btn btn-default" style="text-decoration:none;font-size:.6rem">← Admin</a>
    <a href="baggio-operations.html" class="btn btn-default" style="text-decoration:none;font-size:.6rem">⚙️ Ops</a>
    <div class="tb-clock" id="clockEl"></div>
  </div>
</header>

<!-- LEFT — BOOKING LIST -->
<div class="left-panel">
  <div class="lp-header">
    <div class="lp-title">
      <span>📋 Danh sách booking</span>
      <span id="bookingCount" style="font-family:var(--mono);font-size:.65rem;color:var(--text3)">0</span>
    </div>
    <input class="lp-search" id="bookingSearch" placeholder="🔍 Tìm tên, SĐT, mã đơn..." oninput="filterBookings(this.value)">
    <div class="lp-filter-row">
      <select class="lp-filter" id="statusFilter" onchange="loadBookings()">
        <option value="">Tất cả</option>
        <option value="PENDING">Chờ XN</option>
        <option value="CONFIRMED">Đã XN</option>
        <option value="ONGOING">Đang đi</option>
        <option value="COMPLETED">Hoàn thành</option>
      </select>
      <select class="lp-filter" onchange="sortBookings(this.value)">
        <option value="newest">Mới nhất</option>
        <option value="name">Tên A-Z</option>
        <option value="unread">Chưa liên hệ</option>
      </select>
    </div>
  </div>
  <div class="booking-list" id="bookingList">
    <div style="padding:2rem;text-align:center;color:var(--text3);font-family:var(--mono);font-size:.75rem">⏳ Đang tải...</div>
  </div>
</div>

<!-- RIGHT — CONVERSATION -->
<div class="right-panel">
  <!-- HEADER -->
  <div class="rp-header" id="rpHeader" style="display:none">
    <div class="rp-header-top">
      <div>
        <div class="rp-name" id="rpName">—</div>
        <div class="rp-tour" id="rpTour">—</div>
      </div>
      <div class="rp-actions">
        <a id="rpCallBtn" href="#" class="btn btn-green" style="text-decoration:none;font-size:.6rem">📞 Gọi</a>
        <a id="rpZaloBtn" href="#" class="btn btn-primary" target="_blank" style="text-decoration:none;font-size:.6rem">💬 Zalo</a>
        <button class="btn btn-default" style="font-size:.6rem" onclick="openReminder()">🔔 Nhắc</button>
      </div>
    </div>
    <div class="rp-meta" id="rpMeta"></div>
  </div>

  <!-- STAT STRIP -->
  <div class="stat-strip" id="statStrip" style="display:none">
    <div class="ss-item">Tổng liên lạc: <span class="ss-val" id="ssTotal">0</span></div>
    <div class="ss-item">Cuối cùng: <span class="ss-val" id="ssLast">—</span></div>
    <div class="ss-item">Nhắc nhở: <span class="ss-val" id="ssReminders">0</span></div>
    <div class="ss-item" id="ssNextReminder" style="display:none;color:var(--amber)">⏰ Nhắc tiếp: <span class="ss-val" id="ssNextDate">—</span></div>
  </div>

  <!-- CONVERSATION -->
  <div class="conv-wrap" id="convWrap">
    <div class="empty-conv">
      <div class="empty-conv-icon">💬</div>
      <div style="font-size:.85rem;font-weight:500;color:var(--text2)">Chọn một booking để xem lịch sử liên lạc</div>
      <div style="font-size:.75rem;color:var(--text3)">Ghi lại mọi cuộc gọi, Zalo, email với khách hàng</div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area" id="inputArea" style="display:none">
    <!-- TEMPLATES -->
    <div class="templates-bar" id="templatesBar"></div>
    <div class="input-top">
      <select class="channel-select" id="channelSel">
        <option value="zalo">💬 Zalo</option>
        <option value="call">📞 Gọi</option>
        <option value="email">📧 Email</option>
        <option value="sms">📱 SMS</option>
        <option value="meeting">🤝 Gặp mặt</option>
        <option value="note">📝 Ghi chú nội bộ</option>
      </select>
      <select class="dir-select" id="dirSel">
        <option value="out">↗ Gửi đi</option>
        <option value="in">↙ Nhận về</option>
      </select>
      <label class="remind-check"><input type="checkbox" id="autoRemind"> Tạo nhắc</label>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="Ghi lại nội dung liên lạc..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="send-btn" onclick="sendMsg()">Ghi ▶</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
const LOG_KEY = 'baggio_comms_log'
const REMIND_KEY = 'baggio_comms_reminders'
const fmt = n => Number(n||0).toLocaleString('vi-VN')
const fmtD = d => d ? new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—'
const fmtDT = d => d ? new Date(d).toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'

let bookingsCache = []
let filteredBookings = []
let selectedBooking = null
const CHANNEL_ICONS = {zalo:'💬',call:'📞',email:'📧',sms:'📱',meeting:'🤝',note:'📝'}
const CHANNEL_LABELS = {zalo:'Zalo',call:'Gọi điện',email:'Email',sms:'SMS',meeting:'Gặp mặt',note:'Ghi chú nội bộ'}

setInterval(()=>document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('vi-VN'),1000)

function toast(msg,type='ok'){
  const w=document.getElementById('toastWrap'),t=document.createElement('div')
  t.className='toast'
  t.style.borderLeft=`3px solid ${type==='err'?'var(--red)':type==='warn'?'var(--amber)':'var(--green)'}`
  t.textContent=msg;w.appendChild(t)
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3000)
}

// ── LOGS ──────────────────────────────────────
function getLogs(bookingId){ try{return JSON.parse(localStorage.getItem(`${LOG_KEY}_${bookingId}`)||'[]')}catch{return[]} }
function saveLogs(bookingId,logs){ localStorage.setItem(`${LOG_KEY}_${bookingId}`,JSON.stringify(logs)) }
function getReminders(bookingId){ try{return JSON.parse(localStorage.getItem(`${REMIND_KEY}_${bookingId}`)||'[]')}catch{return[]} }
function saveReminders(bookingId,rems){ localStorage.setItem(`${REMIND_KEY}_${bookingId}`,JSON.stringify(rems)) }

// ── LOAD BOOKINGS ──────────────────────────────
async function loadBookings(){
  const status=document.getElementById('statusFilter').value
  let q=sb.from('bookings').select('id,booking_ref,guest_name,guest_phone,guest_email,status,total_price,deposit_amount,created_at,tours(name,destination,duration_days)').order('created_at',{ascending:false}).limit(100)
  if(status)q=q.eq('status',status)
  const {data,error}=await q
  if(error){toast('Lỗi tải booking','err');return}
  bookingsCache=data||[]
  filteredBookings=[...bookingsCache]
  document.getElementById('bookingCount').textContent=bookingsCache.length
  renderBookingList(filteredBookings)
}

function renderBookingList(list){
  const el=document.getElementById('bookingList')
  if(!list.length){el.innerHTML='<div style="padding:2rem;text-align:center;color:var(--text3);font-size:.8rem">Không có booking</div>';return}
  el.innerHTML=list.map(b=>{
    const logs=getLogs(b.id)
    const reminders=getReminders(b.id)
    const lastLog=logs[logs.length-1]
    const hasUnread=reminders.some(r=>r.date<=new Date().toISOString().split('T')[0]&&!r.done)
    const initials=b.guest_name.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase()
    return`<div class="booking-item ${selectedBooking?.id===b.id?'active':''}" onclick="selectBooking('${b.id}')">
      ${hasUnread?'<div class="bi-unread"></div>':''}
      <div class="bi-ref">
        <span>#${b.booking_ref||b.id.slice(-6)}</span>
        <span class="bi-badge ${b.status?.toLowerCase()}">${b.status}</span>
      </div>
      <div class="bi-name">${b.guest_name||'—'}</div>
      <div class="bi-tour">${b.tours?.name?.slice(0,35)||'—'}</div>
      <div class="bi-meta">
        <span style="font-size:.7rem;color:var(--text3)">${b.guest_phone||'—'}</span>
        ${lastLog?`<span class="bi-last-contact">${CHANNEL_ICONS[lastLog.channel]||'📝'} ${fmtDT(lastLog.createdAt)}</span>`:'<span class="bi-last-contact" style="color:var(--red)">Chưa liên hệ</span>'}
      </div>
    </div>`
  }).join('')
}

function filterBookings(q){
  filteredBookings=bookingsCache.filter(b=>
    b.guest_name?.toLowerCase().includes(q.toLowerCase())||
    b.guest_phone?.includes(q)||
    b.booking_ref?.toLowerCase().includes(q.toLowerCase())||
    b.tours?.name?.toLowerCase().includes(q.toLowerCase())
  )
  renderBookingList(filteredBookings)
}

function sortBookings(by){
  if(by==='name') filteredBookings.sort((a,b)=>a.guest_name.localeCompare(b.guest_name))
  else if(by==='newest') filteredBookings.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))
  else if(by==='unread') filteredBookings.sort((a,b)=>{const la=getLogs(a.id),lb=getLogs(b.id);return la.length-lb.length})
  renderBookingList(filteredBookings)
}

// ── SELECT BOOKING ─────────────────────────────
function selectBooking(id){
  selectedBooking=bookingsCache.find(b=>b.id===id)
  if(!selectedBooking)return
  renderBookingList(filteredBookings)

  const b=selectedBooking
  document.getElementById('rpHeader').style.display='block'
  document.getElementById('statStrip').style.display='flex'
  document.getElementById('inputArea').style.display='block'
  document.getElementById('rpName').textContent=b.guest_name||'—'
  document.getElementById('rpTour').textContent=`${b.tours?.name?.slice(0,50)||'—'} · ${b.tours?.destination||''}`
  document.getElementById('rpCallBtn').href=`tel:${b.guest_phone||''}`
  document.getElementById('rpZaloBtn').href=`https://zalo.me/${b.guest_phone?.replace(/^0/,'84')||''}`
  document.getElementById('rpMeta').innerHTML=`
    <div class="rp-meta-item">📞 <strong>${b.guest_phone||'—'}</strong></div>
    <div class="rp-meta-item">📧 <strong>${b.guest_email||'—'}</strong></div>
    <div class="rp-meta-item">💰 Tổng: <strong>${fmt(b.total_price)}đ</strong></div>
    <div class="rp-meta-item">✅ Cọc: <strong>${fmt(b.deposit_amount)}đ</strong></div>
    <div class="rp-meta-item">📅 Đặt: <strong>${fmtD(b.created_at)}</strong></div>
  `
  renderTemplates()
  renderConversation()
  updateStatStrip()
}

// ── TEMPLATES ─────────────────────────────────

  {label:'Xác nhận đơn',text:'Kính chào [Tên]! Baggio Travel xác nhận đơn đặt tour [Tour] của quý khách. Chúng tôi sẽ liên hệ để xác nhận chi tiết lịch trình. Xin cảm ơn!'},
  {label:'Nhắc thanh toán',text:'Kính chào [Tên]! Nhắc nhở quý khách còn [Số tiền] cần thanh toán trước ngày khởi hành 7 ngày. Quý khách vui lòng chuyển khoản theo thông tin đã cung cấp. Cảm ơn!'},
  {label:'Nhắc khởi hành',text:'Xin chào [Tên]! Tour [Tour] sẽ khởi hành sau 2 ngày. Điểm tập trung lúc [Giờ] tại [Địa điểm]. Hướng dẫn viên [HDV] sẽ liên hệ trực tiếp. Chúc quý khách có chuyến đi vui vẻ!'},
  {label:'Cảm ơn sau tour',text:'Kính chào [Tên]! Baggio Travel xin cảm ơn quý khách đã tham gia tour [Tour]. Hy vọng quý khách có trải nghiệm tuyệt vời! Mong được đồng hành cùng quý khách trong những chuyến đi tiếp theo 🙏'},
  {label:'Hỏi feedback',text:'Xin chào [Tên]! Quý khách có thể cho Baggio biết trải nghiệm của mình trong tour vừa rồi không? Đánh giá của quý khách rất quý giá với chúng tôi ạ!'},
  {label:'Hỏi thăm',text:'Xin chào [Tên]! Baggio Travel hỏi thăm quý khách. Quý khách có cần hỗ trợ gì không ạ?'},
]

function renderTemplates(){
  const b=selectedBooking; if(!b)return
  document.getElementById('templatesBar').innerHTML=TEMPLATES.map((t,i)=>`
    <button class="tmpl-btn" onclick="useTemplate(${i})">${t.label}</button>`).join('')
}

function useTemplate(i){
  const b=selectedBooking; if(!b)return
  let text=TEMPLATES[i].text
  text=text.replace('[Tên]',b.guest_name?.split(' ').pop()||b.guest_name||'quý khách')
  text=text.replace('[Tour]',b.tours?.name?.slice(0,30)||'')
  text=text.replace('[Số tiền]',fmt(Number(b.total_price||0)-Number(b.deposit_amount||0))+'đ')
  document.getElementById('msgInput').value=text
  document.getElementById('msgInput').focus()
}

// ── SEND MESSAGE ───────────────────────────────
function sendMsg(){
  const b=selectedBooking; if(!b)return
  const text=document.getElementById('msgInput').value.trim()
  if(!text){toast('Vui lòng nhập nội dung','warn');return}
  const channel=document.getElementById('channelSel').value
  const dir=document.getElementById('dirSel').value
  const logs=getLogs(b.id)
  logs.push({id:`log_${Date.now()}`,channel,dir,text,createdAt:new Date().toISOString(),staffName:'Baggio Staff'})
  saveLogs(b.id,logs)
  document.getElementById('msgInput').value=''
  document.getElementById('msgInput').style.height='auto'

  // Auto remind
  if(document.getElementById('autoRemind').checked){
    const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1)
    const rems=getReminders(b.id)
    rems.push({id:`rm_${Date.now()}`,date:tomorrow.toISOString().split('T')[0],channel,note:`Theo dõi: ${text.slice(0,60)}...`,done:false})
    saveReminders(b.id,rems)
    document.getElementById('autoRemind').checked=false
    toast('✅ Đã ghi và tạo nhắc nhở ngày mai')
  } else {
    toast('✅ Đã ghi nhận liên lạc')
  }
  renderConversation()
  updateStatStrip()
  renderBookingList(filteredBookings)
}

// ── RENDER CONVERSATION ────────────────────────
function renderConversation(){
  const b=selectedBooking; if(!b)return
  const logs=getLogs(b.id)
  const reminders=getReminders(b.id).filter(r=>!r.done)
  const el=document.getElementById('convWrap')

  if(!logs.length&&!reminders.length){
    el.innerHTML=`<div class="empty-conv">
      <div class="empty-conv-icon">📝</div>
      <div style="font-size:.85rem;color:var(--text2)">Chưa có liên lạc nào với ${b.guest_name}</div>
      <div style="font-size:.75rem;color:var(--text3)">Dùng ô nhập phía dưới để ghi lại cuộc gọi, Zalo, email...</div>
    </div>`
    return
  }

  // Group by date
  const grouped={}
  logs.forEach(l=>{
    const day=l.createdAt.split('T')[0]
    if(!grouped[day])grouped[day]=[]
    grouped[day].push(l)
  })

  let html=''
  // Pending reminders trước
  if(reminders.length){
    html+=`<div style="background:var(--adim);border:1px solid var(--abrd);border-radius:6px;padding:.75rem 1rem;margin-bottom:.5rem">
      <div style="font-family:var(--mono);font-size:.6rem;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">🔔 Nhắc nhở chờ xử lý</div>
      ${reminders.map(r=>`<div style="display:flex;align-items:center;gap:.65rem;padding:.35rem 0;border-bottom:1px solid rgba(210,153,34,.15)">
        <span style="font-family:var(--mono);font-size:.68rem;color:var(--amber);flex-shrink:0">${fmtD(r.date)}</span>
        <span style="font-size:.8rem;color:var(--text);flex:1">${CHANNEL_ICONS[r.channel]||'📝'} ${r.note}</span>
        <button style="background:var(--green);border:none;color:#0d1117;font-family:var(--mono);font-size:.55rem;padding:.2rem .5rem;border-radius:3px;cursor:pointer" onclick="doneReminder('${b.id}','${r.id}')">✓ Xong</button>
      </div>`).join('')}
    </div>`
  }

  Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([day,msgs])=>{
    html+=`<div class="msg-date-sep"><span>${fmtD(day)}</span></div>`
    msgs.forEach(m=>{
      const isOut=m.dir==='out'||!m.dir
      const isNote=m.channel==='note'
      if(isNote){
        html+=`<div style="background:var(--adim);border:1px solid var(--abrd);border-radius:5px;padding:.55rem .9rem;margin:.15rem 2rem">
          <div style="font-family:var(--mono);font-size:.55rem;color:var(--amber);text-transform:uppercase;margin-bottom:.2rem">📝 Ghi chú nội bộ · ${fmtDT(m.createdAt)}</div>
          <div style="font-size:.82rem;color:var(--amber);font-style:italic">${m.text}</div>
        </div>`
      } else {
        html+=`<div class="msg-row ${isOut?'out':''}">
          <div class="msg-avatar ${isOut?'staff':'guest'}">${isOut?'B':'K'}</div>
          <div>
            <div class="msg-type-badge mt-${m.channel}">${CHANNEL_ICONS[m.channel]||'📝'} ${CHANNEL_LABELS[m.channel]||m.channel} · ${isOut?'Gửi đi':'Nhận về'}</div>
            <div class="msg-bubble ${isOut?'out':'in'}">${m.text}</div>
            <div class="msg-time">${fmtDT(m.createdAt)}</div>
          </div>
        </div>`
      }
    })
  })

  el.innerHTML=html
  el.scrollTop=el.scrollHeight
}

function doneReminder(bookingId,remId){
  const rems=getReminders(bookingId).map(r=>r.id===remId?{...r,done:true}:r)
  saveReminders(bookingId,rems)
  renderConversation(); updateStatStrip()
  toast('✅ Đã hoàn thành nhắc nhở')
}

function updateStatStrip(){
  const b=selectedBooking; if(!b)return
  const logs=getLogs(b.id)
  const rems=getReminders(b.id).filter(r=>!r.done)
  const lastLog=logs[logs.length-1]
  const nextRem=rems.sort((a,b_)=>a.date.localeCompare(b_.date))[0]
  document.getElementById('ssTotal').textContent=logs.length
  document.getElementById('ssLast').textContent=lastLog?fmtDT(lastLog.createdAt):'Chưa có'
  document.getElementById('ssReminders').textContent=rems.length
  if(nextRem){
    document.getElementById('ssNextReminder').style.display='flex'
    document.getElementById('ssNextDate').textContent=fmtD(nextRem.date)
  } else {
    document.getElementById('ssNextReminder').style.display='none'
  }
}

// ── REMINDER MODAL ─────────────────────────────
function openReminder(){
  if(!selectedBooking){toast('Vui lòng chọn booking','warn');return}
  const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1)
  document.getElementById('rm_date').value=tomorrow.toISOString().split('T')[0]
  document.getElementById('rm_note').value=''
  document.getElementById('reminderModal').classList.add('open')
}
function closeReminder(){ document.getElementById('reminderModal').classList.remove('open') }
function saveReminder(){
  const b=selectedBooking; if(!b)return
  const date=document.getElementById('rm_date').value
  if(!date){toast('Chọn ngày nhắc','warn');return}
  const rems=getReminders(b.id)
  rems.push({id:`rm_${Date.now()}`,date,channel:document.getElementById('rm_channel').value,note:document.getElementById('rm_note').value.trim()||'Liên hệ khách hàng',done:false})
  saveReminders(b.id,rems)
  closeReminder(); renderConversation(); updateStatStrip()
  toast('🔔 Đã tạo nhắc nhở')
}

// ── INIT ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadBookings)
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReminder()})
</script>
