.dot-ok{background:var(--green)}.dot-wait{background:var(--amber)}
.tour-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.65rem;margin-bottom:1.25rem}
.card{background:var(--s2);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.card-img{width:100%;height:100px;object-fit:cover;background:var(--s1);display:block}
.card-body{padding:.65rem}
.card-name{font-weight:600;font-size:.85rem;margin-bottom:.25rem}
.card-meta{display:flex;flex-wrap:wrap;gap:.35rem;font-size:.7rem;color:var(--text2)}
.card-status{margin-top:.35rem;font-size:.72rem}
.ok{color:var(--green)}.err{color:var(--red)}.pending{color:var(--text2)}.info{color:var(--blue)}
.badge{font-family:'Courier New',monospace;font-size:.52rem;padding:.12rem .38rem;border-radius:3px;text-transform:uppercase}
.b-g{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.b-b{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.25);color:var(--blue)}
.b-a{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.25);color:var(--amber)}
.log{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:.85rem;font-family:'Courier New',monospace;font-size:.72rem;line-height:1.9;max-height:260px;overflow-y:auto;color:var(--text2);margin-top:.75rem;white-space:pre-wrap}

  const m={'à':'a','á':'a','ả':'a','ã':'a','ạ':'a','ă':'a','ắ':'a','ặ':'a','ằ':'a','ẵ':'a','ẳ':'a','â':'a','ấ':'a','ậ':'a','ầ':'a','ẫ':'a','ẩ':'a','đ':'d','è':'e','é':'e','ẹ':'e','ẻ':'e','ẽ':'e','ê':'e','ế':'e','ệ':'e','ề':'e','ễ':'e','ể':'e','ì':'i','í':'i','ị':'i','ỉ':'i','ĩ':'i','ò':'o','ó':'o','ọ':'o','ỏ':'o','õ':'o','ô':'o','ố':'o','ộ':'o','ồ':'o','ỗ':'o','ổ':'o','ơ':'o','ớ':'o','ợ':'o','ờ':'o','ỡ':'o','ở':'o','ù':'u','ú':'u','ụ':'u','ủ':'u','ũ':'u','ư':'u','ứ':'u','ự':'u','ừ':'u','ữ':'u','ử':'u','ỳ':'y','ý':'y','ỵ':'y','ỷ':'y','ỹ':'y'}

// ── RENDER CARDS ─────────────────────────────────────
function renderCards(){
  const grid = document.getElementById('tourGrid')
  grid.innerHTML = TOURS.map((t,i)=>{
    const price = (t.base_price/1e6).toFixed(1)+'M₫'
    const reg = {north:'🏔 Bắc',central:'🏖 Trung',south:'🌊 Nam'}[t.region]||t.region
    return `
    <div class="card" id="card-${i}">
      <img class="card-img" src="${t.cover_image}" onerror="this.style.background='#1c2230'" loading="lazy">
      <div class="card-body">
        <div class="card-name">${t.name_vi}</div>
        <div class="card-meta">
          <span>📍 ${t.destination}</span><span>${reg}</span>
          <span>${t.duration_days}N${t.duration_nights}Đ</span>
          <span style="color:var(--amber);font-family:'Courier New',monospace">${price}</span>
        </div>
        <div class="card-status pending" id="st-${i}">Chờ seed</div>
      </div>
    </div>`
  }).join('')
}

// ── SEED ─────────────────────────────────────────────
async function runSeed(){
  const btn = document.getElementById('btnRun')
  const prog = document.getElementById('prog')
  const log = document.getElementById('log')

  const serviceKey = document.getElementById('serviceKey').value.trim()
  if(!serviceKey){ alert('Cần nhập service role key trước'); return }
  const client = supabase.createClient(SUPABASE_URL, serviceKey)

  btn.disabled = true
  prog.style.display = 'block'
  log.style.display = 'block'
  log.textContent = '▶ Bắt đầu seed 10 tours...\n'
  let ok=0, fail=0

  for(let i=0; i<TOURS.length; i++){
    const t = TOURS[i]
    const slug = slugVi(t.name_vi) + '-' + Date.now().toString().slice(-5)
    const payload = {...t, slug}
    const {error} = await client.from('tours').insert(payload)
    prog.value = i+1
    const st = document.getElementById('st-'+i)
    if(error){
      fail++
      st.className='card-status err'
      st.textContent='✗ '+error.message
      log.textContent += `✗ [${i+1}] ${t.name_vi}\n   ${error.message}\n`
    } else {
      ok++
      st.className='card-status ok'
      st.textContent='✓ Đã tạo'
      log.textContent += `✓ [${i+1}] ${t.name_vi}\n`
    }
    log.scrollTop = log.scrollHeight
    await new Promise(r=>setTimeout(r,250))
  }
  log.textContent += `\n═══ Xong: ${ok} OK / ${fail} lỗi ═══`
  btn.disabled = false
  btn.textContent = `✓ Hoàn thành (${ok}/${TOURS.length})`
}

async function runClear(){
  if(!confirm('Xóa toàn bộ tour DRAFT khỏi Supabase?')) return
  const {error, count} = await sb.from('tours').delete({count:'exact'}).eq('status','DRAFT')
  if(error){ alert('Lỗi: '+error.message); return }
  alert(`Đã xóa ${count??'?'} tour DRAFT`)
}

// ── INIT ──────────────────────────────────────────────
renderCards()
